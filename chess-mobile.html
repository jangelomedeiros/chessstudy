<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0b0d12">
<title>Chess Study Mobile</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  /* tabuleiro preenche a largura da tela, máx 56px por casa */
  --sq: min(calc((100vw - 2px) / 8), 56px);
  --board: calc(var(--sq) * 8);
  --bg:#0b0d12;--s1:#13161e;--s2:#1b1f2a;--bd:#2b3149;
  --gold:#c9a84c;--gdim:#7a6028;--glow:#e8c068;
  --tx:#e0d8c8;--txd:#5e6685;--txm:#9ba0bc;
  --ql:#f0d9b5;--qd:#b58863;
  --green:#4a9e6e;--red:#9e4a4a;
  --fm:'JetBrains Mono',monospace;--fh:'Playfair Display',Georgia,serif;
  --safe-b: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;height:100dvh}
body{
  height:100%;height:100dvh;
  overflow:hidden;
  background:var(--bg);color:var(--tx);
  font-family:var(--fm);
  display:flex;flex-direction:column;
}

/* ── BOOT ── */
#boot{
  position:fixed;inset:0;background:var(--bg);z-index:200;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;
}
.boot-logo{font-family:var(--fh);font-size:26px;color:var(--gold)}
.boot-msg{font-size:10px;color:var(--txd)}
.boot-msg::after{content:'';animation:da 1.2s infinite}
@keyframes da{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}

/* ── APP ── */
#app{display:flex;flex-direction:column;height:100%;height:100dvh;overflow:hidden}

/* ── HEADER ── */
.hd{
  flex-shrink:0;height:44px;
  background:var(--s1);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 12px;gap:10px;
  padding-top:env(safe-area-inset-top, 0px);
}
.hd-logo{font-family:var(--fh);font-size:15px;color:var(--gold);font-weight:700;letter-spacing:.03em}
.hd-sub{font-size:8px;color:var(--txd);letter-spacing:.12em;margin-left:2px}
.hd-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.hd-btn{
  background:rgba(74,158,110,.1);border:1px solid rgba(74,158,110,.3);
  border-radius:4px;color:var(--green);font-family:var(--fm);
  font-size:10px;padding:5px 10px;cursor:pointer;
}
.hd-btn:active{background:rgba(74,158,110,.2)}

/* ── ZONA DO TABULEIRO ── */
.bz{
  flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;
  padding:6px 1px 4px;gap:4px;
}

/* Linha do jogador */
.pr{
  width:var(--board);display:flex;align-items:center;
  justify-content:space-between;gap:8px;padding:0 2px;
}
.pi{display:flex;align-items:center;gap:7px}
.pic{font-size:calc(var(--sq) * 0.32);line-height:1}
.pn{font-family:var(--fh);font-size:13px;font-weight:700}
.ps{font-size:7px;color:var(--txd);letter-spacing:.1em}
.rbdg{
  font-size:10px;color:var(--gold);
  background:var(--s2);border:1px solid var(--gdim);
  border-radius:2px;padding:2px 7px;
}

/* ── TABULEIRO ── */
#board{
  display:grid;
  grid-template-columns:repeat(8,var(--sq));
  grid-template-rows:repeat(8,var(--sq));
  width:var(--board);height:var(--board);
  flex-shrink:0;
  border:1px solid #1a1e28;
  box-shadow:0 4px 24px rgba(0,0,0,.6);
}
.sq{display:flex;align-items:center;justify-content:center;position:relative;user-select:none}
.sq.lt{background:var(--ql)}.sq.dk{background:var(--qd)}
.sq.lmf{outline:3px solid rgba(130,200,50,.9);outline-offset:-3px;z-index:1}
.sq.lmt{background:#bcd020!important}
.cr{position:absolute;font-size:calc(var(--sq)*0.12);font-family:var(--fm);font-weight:600;opacity:.65;line-height:1}
.cr-r{top:1px;left:2px}.cr-f{bottom:1px;right:2px}
.sq.lt .cr{color:var(--qd)}.sq.dk .cr{color:var(--ql)}
.pc{font-size:calc(var(--sq)*0.72);line-height:1;pointer-events:none}
.pw{color:#fffce8;filter:drop-shadow(0 0 1.5px rgba(0,0,0,.95)) drop-shadow(0 1px 3px rgba(0,0,0,.7))}
.pb{color:#0e0a04;filter:drop-shadow(0 0 1px rgba(255,255,255,.25)) drop-shadow(0 1px 2px rgba(0,0,0,.5))}

/* ── CONTROLES ── */
.ctrl{
  width:var(--board);
  display:flex;align-items:center;gap:3px;
  background:var(--s1);border:1px solid var(--bd);border-radius:6px;
  padding:4px 6px;
}
.cb{
  flex:1;min-height:40px;
  background:transparent;border:none;
  color:var(--txm);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  border-radius:4px;transition:background .1s;
}
.cb:active{background:var(--s2)}
.cb.lg{flex:1.5}
.mctr{
  font-size:9px;color:var(--txd);
  text-align:center;white-space:nowrap;
  padding:0 4px;flex:1.2;
}
.vsep{width:1px;height:18px;background:var(--bd);flex-shrink:0}

/* ── BARRA DE AVALIAÇÃO (fina, sempre visível) ── */
.ev-thin{
  flex-shrink:0;
  width:var(--board);
  height:5px;
  background:var(--s2);
  border-radius:3px;
  overflow:hidden;
  position:relative;
  margin:0 auto;
  display:none;
}
.ev-thin.on{display:block}
.ev-thin-bk{position:absolute;left:0;top:0;height:100%;background:#1a1d26;transition:width .45s}
.ev-thin-wh{position:absolute;right:0;top:0;height:100%;background:var(--gold);transition:width .45s}

/* ── ANÁLISE (compacta, expansível) ── */
.af{
  flex-shrink:0;
  background:var(--s1);
  border-top:1px solid var(--bd);
  border-bottom:1px solid var(--bd);
  overflow:hidden;
  transition:max-height .25s ease;
  max-height:120px;
  cursor:pointer;
}
.af.mini{max-height:34px}
.af-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px 7px;border-bottom:1px solid var(--bd);
  background:var(--s2);
}
.af-lbl{font-size:8px;letter-spacing:.14em;color:var(--txd);display:flex;align-items:center;gap:5px}
.af-dot{width:5px;height:5px;border-radius:50%;background:var(--txd);flex-shrink:0}
.af-lbl.cur .af-dot{background:#82c0a0}.af-lbl.cur{color:#82c0a0}
.af-lbl.eng .af-dot{background:var(--gold)}.af-lbl.eng{color:var(--gold)}
.af-mv{font-size:9px;color:var(--txm);font-weight:500}
.af-tog{font-size:11px;color:var(--txd)}
.ev-row{display:none;align-items:center;gap:8px;padding:5px 12px;border-bottom:1px solid var(--bd)}
.ev-row.on{display:flex}
.ev-bg{flex:1;height:5px;background:var(--s2);border-radius:3px;overflow:hidden;position:relative}
.ev-bk{position:absolute;left:0;top:0;height:100%;background:#1a1d26;transition:width .45s}
.ev-wh{position:absolute;right:0;top:0;height:100%;background:var(--gold);transition:width .45s}
.ev-sc{font-size:11px;font-weight:600;white-space:nowrap}
.ev-sc.pos{color:var(--gold)}.ev-sc.neg{color:var(--txm)}.ev-sc.eq{color:var(--txd)}
.ev-dp{font-size:8px;color:var(--txd)}
.ev-bl{padding:4px 12px;font-size:9px;color:var(--txd);display:none;border-bottom:1px solid var(--bd)}
.ev-bl.on{display:block}
.ev-bl strong{color:var(--txm)}
.af-txt{padding:8px 12px;font-size:12px;line-height:1.55;color:var(--txm)}
.af-txt.it{font-style:italic;color:var(--tx)}
.af-txt.mt{font-size:10px;color:var(--txd)}

/* ── TABS (bottom nav) ── */
.tb{
  flex-shrink:0;
  display:flex;
  background:var(--s1);
  border-top:1px solid var(--bd);
  padding-bottom:var(--safe-b);
}
.ti{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:2px;padding:8px 4px;
  cursor:pointer;color:var(--txd);transition:color .12s;
  min-height:48px;
}
.ti:active{background:var(--s2)}
.ti.on{color:var(--gold)}
.ti-ic{font-size:18px;line-height:1}
.ti-lb{font-size:8px;letter-spacing:.08em}

/* ── CONTEÚDO DAS TABS ── */
.tc{flex:1;min-height:0;overflow:hidden;position:relative}
.pane{
  position:absolute;inset:0;overflow-y:auto;padding:10px;
  display:none;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:var(--bd) transparent;
}
.pane.on{display:block}

/* Seção header */
.shd{font-size:8px;letter-spacing:.18em;color:var(--txd);text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.shd button{background:none;border:1px solid var(--bd);border-radius:2px;color:var(--txd);cursor:pointer;font-family:var(--fm);font-size:8px;padding:2px 6px}

/* Cards */
.gc{background:var(--s1);border:1px solid var(--bd);border-radius:4px;padding:10px;margin-bottom:6px;cursor:pointer;position:relative}
.gc:active{background:var(--s2)}.gc.on{border-color:var(--gold)}
.gt{font-family:var(--fh);font-size:13px;margin-bottom:2px;padding-right:20px;color:var(--tx)}
.gs{font-size:9px;color:var(--txd);margin-bottom:4px}
.gd{font-size:11px;color:var(--txm);line-height:1.4}
.bdg{display:inline-block;background:var(--s2);border:1px solid var(--bd);border-radius:2px;padding:1px 5px;font-size:8px;color:var(--txd);margin-top:4px;margin-right:2px}
.bdg.u{border-color:rgba(74,158,110,.3);color:var(--green)}
.del{position:absolute;top:10px;right:10px;background:none;border:1px solid var(--bd);border-radius:2px;color:var(--txd);cursor:pointer;font-size:12px;padding:1px 7px;min-height:32px;min-width:32px}
.del:active{border-color:var(--red);color:var(--red)}
.elib{color:var(--txd);font-size:10px;padding:16px 10px;border:1px dashed var(--bd);border-radius:4px;text-align:center;line-height:1.8}

/* Formulário Lichess */
.sf label{display:block;font-size:8px;letter-spacing:.12em;color:var(--txd);margin:10px 0 3px}
.sf label:first-child{margin-top:0}
.sf input,.sf textarea{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:3px;color:var(--tx);font-family:var(--fm);font-size:12px;padding:10px;outline:none}
.sf textarea{min-height:60px;resize:vertical;font-size:10px}
.gbtn{width:100%;margin-top:4px;background:var(--gold);border:none;border-radius:3px;color:#0b0d12;font-family:var(--fm);font-size:11px;font-weight:500;padding:10px;cursor:pointer;min-height:44px}
.gbtn:active{background:var(--glow)}
.msg{border-radius:3px;padding:7px 10px;font-size:10px;margin-top:6px}
.msg.err{background:rgba(180,50,50,.1);border:1px solid rgba(180,50,50,.3);color:#e07070}
.msg.ok{background:rgba(50,150,80,.1);border:1px solid rgba(50,150,80,.3);color:#70c090}
.ld{text-align:center;padding:14px;font-size:10px;color:var(--txd)}
.da::after{content:'';animation:da 1.2s infinite}

/* Lista de lances */
.ml{font-size:12px}
.mr{display:grid;grid-template-columns:24px 1fr 1fr;gap:2px;align-items:center;padding:3px 2px;border-radius:2px;min-height:32px}
.mr:active{background:var(--s2)}
.mn{color:var(--txd);font-size:9px;text-align:right;padding-right:4px}
.mb{padding:5px 8px;border-radius:2px;cursor:pointer;color:var(--txm);font-size:11px;min-height:32px;display:flex;align-items:center}
.mb:active{background:var(--s2);color:var(--gold)}
.mb.on{background:var(--gold);color:#0b0d12;font-weight:500}
.mb.ha::after{content:'●';color:#82c0a0;margin-left:3px;font-size:7px;vertical-align:middle}

/* ── MODAL SALVAR ── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.mbg.on{opacity:1;pointer-events:all}
.md{
  background:var(--s1);border:1px solid var(--bd);border-radius:12px 12px 0 0;
  padding:20px 20px calc(20px + var(--safe-b));width:100%;max-height:80vh;overflow-y:auto;
  box-shadow:0 -8px 40px rgba(0,0,0,.6);
}
.mdt{font-family:var(--fh);font-size:16px;margin-bottom:16px;color:var(--gold)}
.md label{display:block;font-size:8px;letter-spacing:.12em;color:var(--txd);margin:12px 0 4px}
.md label:first-of-type{margin-top:0}
.md input,.md textarea{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:3px;color:var(--tx);font-family:var(--fm);font-size:12px;padding:10px;outline:none}
.md textarea{min-height:56px;resize:none;font-size:10px}
.mtags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.mtg{background:var(--s2);border:1px solid var(--bd);border-radius:3px;padding:6px 10px;cursor:pointer;font-size:9px;color:var(--txd);min-height:36px;display:flex;align-items:center}
.mtg:active{border-color:var(--gdim)}.mtg.on{border-color:var(--gold);color:var(--gold)}
.mbt{display:flex;gap:8px;margin-top:18px}
.mbt-btn{flex:1;padding:12px;border:1px solid var(--bd);border-radius:4px;background:var(--s2);color:var(--tx);font-family:var(--fm);font-size:11px;cursor:pointer;text-align:center}
.mbt-btn:active{background:var(--s3)}
.mbt-btn.sv{background:rgba(74,158,110,.15);border-color:var(--green);color:var(--green);font-weight:500}
.mbt-btn.sv:active{background:rgba(74,158,110,.25)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(60px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--s2);border:1px solid var(--gdim);border-radius:20px;
  padding:10px 20px;font-size:11px;color:var(--gold);
  z-index:999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;
}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{border-color:rgba(180,50,50,.5);color:#e07070}

/* ── SWIPE INDICADOR ── */
.swipe-hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.7);color:var(--gold);padding:16px 24px;border-radius:8px;font-size:12px;z-index:150;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center}
.swipe-hint.on{opacity:1}
</style>
</head>
<body>

<div id="boot">
  <div class="boot-logo">♟ Chess Study</div>
  <div class="boot-msg">Carregando</div>
</div>

<div id="app">

  <!-- HEADER -->
  <div class="hd">
    <div>
      <div class="hd-logo">♟ Chess Study</div>
    </div>
    <div class="hd-right">
      <span id="moveCtr" style="font-size:10px;color:var(--txd)">— / —</span>
      <button class="hd-btn" onclick="openSaveModal()">💾 Salvar</button>
    </div>
  </div>

  <!-- ZONA DO TABULEIRO -->
  <div class="bz">
    <div class="pr">
      <div class="pi">
        <span class="pic">♚</span>
        <div><div class="pn" id="pBlack">—</div><div class="ps">NEGRAS</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <div id="resultBadge"></div>
        <div style="font-size:8px;color:var(--txd);text-align:right;max-width:120px;line-height:1.3" id="evTag"></div>
      </div>
    </div>

    <div id="board"></div>

    <div class="pr">
      <div class="pi">
        <span class="pic">♔</span>
        <div><div class="pn" id="pWhite">—</div><div class="ps">BRANCAS</div></div>
      </div>
    </div>

    <div class="ctrl">
      <button class="cb" onclick="goStart()">⏮</button>
      <button class="cb lg" onclick="prev()">◀</button>
      <button class="cb" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="cb lg" onclick="next()">▶</button>
      <button class="cb" onclick="goEnd()">⏭</button>
      <div class="vsep"></div>
      <input type="range" id="speedSlider" min="300" max="3000" value="1200" step="300" style="width:50px;accent-color:var(--gold)">
      <div class="vsep"></div>
      <button class="cb" onclick="flip()">⟳</button>
    </div>
  </div>

  <!-- ANÁLISE COMPACTA -->
  <div class="af" id="af" onclick="toggleAf()">
    <div class="af-hd">
      <div class="af-lbl" id="annLabel">
        <span class="af-dot"></span>
        <span id="annLabelTxt">—</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="af-mv" id="annMove"></div>
        <div class="af-tog" id="afTog">▲</div>
      </div>
    </div>
    <div class="ev-row" id="evalRow">
      <span style="font-size:8px;color:var(--txd)">♚</span>
      <div class="ev-bg">
        <div class="ev-bk" id="evbk" style="width:50%"></div>
        <div class="ev-wh" id="evwh" style="width:50%"></div>
      </div>
      <span style="font-size:8px;color:var(--txd)">♔</span>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px">
        <span class="ev-sc" id="evScore"></span>
        <span class="ev-dp" id="evDepth"></span>
      </div>
    </div>
    <div class="ev-bl" id="evBestLine"></div>
    <div class="af-txt mt" id="annBox">Selecione uma partida para começar.</div>
  </div>

  <!-- BOTTOM TAB BAR -->
  <nav class="tb">
    <div class="ti on" id="tab-mv" onclick="switchTab('mv')">
      <span class="ti-ic">♟</span>
      <span class="ti-lb">LANCES</span>
    </div>
    <div class="ti" id="tab-lib" onclick="switchTab('lib')">
      <span class="ti-ic">📖</span>
      <span class="ti-lb">CLÁSSICAS</span>
    </div>
    <div class="ti" id="tab-user" onclick="switchTab('user')">
      <span class="ti-ic">⭐</span>
      <span class="ti-lb">MINHA</span>
    </div>
    <div class="ti" id="tab-lich" onclick="switchTab('lich')">
      <span class="ti-ic">🌐</span>
      <span class="ti-lb">LICHESS</span>
    </div>
  </nav>

  <!-- CONTEÚDO DAS TABS -->
  <div class="tc">

    <div class="pane on" id="pane-mv">
      <div class="shd">Lances — toque para navegar</div>
      <div class="ml" id="mvList"></div>
    </div>

    <div class="pane" id="pane-lib">
      <div class="shd">Partidas Clássicas</div>
      <div id="libList"></div>
    </div>

    <div class="pane" id="pane-user">
      <div class="shd">
        <span>Minha Biblioteca (<span id="userCount">0</span>)</span>
        <button onclick="exportLib()">⬇ Exportar</button>
      </div>
      <div id="userList"></div>
    </div>

    <div class="pane" id="pane-lich">
      <div class="sf">
        <label>JOGADOR (Lichess)</label>
        <input type="text" id="lichUser" placeholder="nome de usuário..." autocapitalize="none" autocorrect="off">
        <button class="gbtn" onclick="searchLich()">Buscar Partidas</button>
        <label>URL (lichess.org/...)</label>
        <input type="text" id="lichURL" placeholder="https://lichess.org/..." autocapitalize="none" autocorrect="off">
        <button class="gbtn" onclick="importURL()">Importar Partida</button>
        <label>COLAR PGN</label>
        <textarea id="pgnPaste" placeholder="[Event &quot;...&quot;]&#10;[White &quot;...&quot;]&#10;[Result &quot;...&quot;]&#10;&#10;1. e4 e5 ..."></textarea>
        <button class="gbtn" onclick="loadPGNDirect()">Carregar PGN</button>
      </div>
      <div id="searchRes"></div>
    </div>

  </div>
</div>

<!-- MODAL SALVAR -->
<div class="mbg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="md">
    <div class="mdt">💾 Salvar na Biblioteca</div>
    <label>NOME DA PARTIDA</label>
    <input type="text" id="saveName" placeholder="Ex: Siciliana — erro no 15º lance">
    <label>ANOTAÇÃO PESSOAL</label>
    <textarea id="saveNote" placeholder="Por que esta partida é relevante..."></textarea>
    <label>CATEGORIAS</label>
    <div class="mtags">
      <div class="mtg" onclick="this.classList.toggle('on')" data-tag="abertura">Abertura</div>

// ── ANÁLISE ─────────────────────────────────────────────
function cMat(fen,c){try{var g=new Chess(fen),t=0;g.board().forEach(function(r){r.forEach(function(p){if(p&&p.color===c&&p.type!=='k')t+=(PV[p.type]||0)})});return t}catch(e){return 0}}
function isFOpen(fen,f){try{var g=new Chess(fen),fi=f.charCodeAt(0)-97;return!g.board().some(function(r){var p=r[fi];return p&&p.type==='p'})}catch(e){return false}}
function cDev(fen,c){try{var g=new Chess(fen),n=0;g.board().forEach(function(r,ri){r.forEach(function(p,fi){if(!p||p.color!==c||p.type==='p'||p.type==='k')return;var sq=String.fromCharCode(97+fi)+(8-ri);if((ST[c][p.type]||[]).indexOf(sq)<0)n++})});return n}catch(e){return 0}}

function analyzeMove(mo,fb,fa,pi){
  if(!mo||!fb||!fa)return'';
  var c=mo.color,side=c==='w'?'Brancas':'Negras',oppS=c==='w'?'Negras':'Brancas';
  var piece=mo.piece,from=mo.from,to=mo.to,flags=mo.flags||'';
  var mn=Math.floor(pi/2)+1,parts=[];
  if(flags.indexOf('k')>=0){parts.push('Roque pequeno: rei abrigado, torre ativa na coluna f.')}
  else if(flags.indexOf('q')>=0){parts.push('Roque longo: rei abrigado na ala da dama.')}
  else if(flags.indexOf('e')>=0){parts.push('Captura en passant em '+to+'.')}
  else if(mo.promotion){parts.push('Promoção para '+(({q:'Dama',r:'Torre',b:'Bispo',n:'Cavalo'}[mo.promotion])||'peça')+'!')}
  else if(mo.captured){
    var cv=PV[mo.captured]||0,pv2=PV[piece]||0,diff=cv-pv2;
    if(diff>0) parts.push((PN[piece]||piece)+' captura '+(PN[mo.captured]||mo.captured)+' em '+to+' com ganho de +'+diff+' ponto(s).');
    else if(diff===0) parts.push('Troca equivalente em '+to+': '+(PN[piece]||piece)+' por '+(PN[mo.captured]||mo.captured)+' ('+cv+'pts cada).');
    else parts.push('Sacrifício! '+(PN[piece]||piece)+' entrega '+Math.abs(diff)+' ponto(s) em '+to+' em busca de compensação tática.');
  }else{
    var isDev=(ST[c][piece]||[]).indexOf(from)>=0&&piece!=='p'&&piece!=='k';
    var toCtr=CTR.indexOf(to)>=0;
    var rank=parseInt(to[1]),is7=(c==='w'&&rank===7)||(c==='b'&&rank===2);
    if(piece==='p'){
      if(toCtr) parts.push('Peão avança para '+to+', ocupando o centro. Controle central fundamental.');
      else parts.push('Peão avança de '+from+' para '+to+'.');
    }else if(isDev){parts.push((PN[piece]||piece)+' desenvolve para '+to+(toCtr?', posição central ativa':'')+'. Coordenação das '+side+' aumenta.')}
    else if(piece==='n'&&(to[0]==='a'||to[0]==='h')){parts.push('"Cavalo na borda é sempre fraco" — controla apenas 2–4 casas.')}
    else if(piece==='r'){
      var file=to[0];
      if(isFOpen(fa,file)) parts.push('Torre ocupa coluna '+file.toUpperCase()+' aberta — posição máxima de pressão.');
      else if(is7) parts.push('Torre penetra no 7º rank — extremamente agressivo.');
      else parts.push('Torre reposiciona para '+to+'.');
    }else if(piece==='q'&&mn<=6){parts.push('Dama saindo cedo (lance '+mn+'). Risco: pode virar alvo com ganho de tempo.')}
    else{parts.push((PN[piece]||piece)+' move de '+from+' para '+to+'.')}
  }
  var devB=cDev(fb,c),devA=cDev(fa,c),devOB=cDev(fb,c==='w'?'b':'w');
  if(devA>devB){var ah=devA-devOB;if(ah>0)parts.push('As '+side+' lideram o desenvolvimento em '+ah+' peça(s).')}
  if(mo.captured&&piece==='p'){if(isFOpen(fa,to[0]))parts.push('Captura abre coluna '+to[0].toUpperCase()+' para as torres.')}
  try{
    var ga=new Chess(fa);
    if(ga.in_checkmate()) parts.push('XEQUE-MATE! As '+side+' vencem.');
    else if(ga.in_check()) parts.push('O rei das '+oppS+' está em xeque.');
    else if(ga.in_stalemate()) parts.push('AFOGAMENTO — empate!');
  }catch(ex){}
  var mW=cMat(fa,'w'),mB=cMat(fa,'b'),df=mW-mB;
  if(Math.abs(df)>=2){var ld=df>0?'Brancas':'Negras';parts.push('Balanço: '+ld+' lideram por '+Math.abs(df)+' pts (♔'+mW+' · ♚'+mB+').')}
  return parts.join(' ');
}

// ── LICHESS EVAL ──────────────────────────────────────
async function fetchEval(fen){
  if(evCache[fen])return evCache[fen];
  try{
    var r=await fetch('https://lichess.org/api/cloud-eval?fen='+encodeURIComponent(fen)+'&multiPv=1');
    if(!r.ok)return null;
    var d=await r.json();if(!d.pvs||!d.pvs.length)return null;
    var pv=d.pvs[0],turn=fen.split(' ')[1],sn,st;
    if(pv.mate!==undefined){var m=pv.mate,ww=(turn==='w'&&m>0)||(turn==='b'&&m<0);sn=ww?9999:-9999;st=ww?'M+'+Math.abs(m):'M-'+Math.abs(m)}
    else{var cp=pv.cp;sn=turn==='w'?cp:-cp;var v=(sn/100).toFixed(1);st=sn>=0?'+'+v:v}
    var bs='';
    if(pv.moves){var uci=pv.moves.split(' ').slice(0,4),gt=new Chess(fen),ss=[];
      for(var i=0;i<uci.length;i++){try{var mv2=gt.move({from:uci[i].slice(0,2),to:uci[i].slice(2,4),promotion:uci[i][4]||undefined});if(mv2)ss.push(mv2.san);else break}catch(ex){break}}
      bs=ss.join(' ')}
    var res={sn:sn,st:st,dp:d.depth||0,bs:bs};evCache[fen]=res;return res;
  }catch(ex){return null}
}

function renderEval(ev){
  var row=document.getElementById('evalRow'),bl=document.getElementById('evBestLine');
  if(!ev){row.classList.remove('on');bl.classList.remove('on');return}
  row.classList.add('on');
  var clamp=Math.max(-500,Math.min(500,ev.sn)),wp=Math.max(4,Math.min(96,50+clamp/10));
  document.getElementById('evwh').style.width=wp+'%';document.getElementById('evbk').style.width=(100-wp)+'%';
  var sc=document.getElementById('evScore');sc.textContent=ev.st;sc.className='ev-sc '+(ev.sn>30?'pos':ev.sn<-30?'neg':'eq');
  document.getElementById('evDepth').textContent='SF·prof'+ev.dp;
  if(ev.bs){bl.classList.add('on');bl.innerHTML='<strong>↳</strong> '+ev.bs}else bl.classList.remove('on');
}

// ── TABULEIRO ──────────────────────────────────────────
function sq2c(sq){return{f:sq.charCodeAt(0)-97,r:parseInt(sq[1])-1}}
function renderBoard(){
  var bd=game.board(),el=document.getElementById('board');el.innerHTML='';
  var lf=lastMove?sq2c(lastMove.from):null,lt=lastMove?sq2c(lastMove.to):null;
  for(var vr=0;vr<8;vr++){for(var vc=0;vc<8;vc++){
    var br=flipped?7-vr:vr,bc=flipped?7-vc:vc,rank=7-br,file=bc;
    var isLt=(rank+file)%2!==0,isF=lf&&lf.f===file&&lf.r===rank,isT=lt&&lt.f===file&&lt.r===rank;
    var div=document.createElement('div');
    div.className='sq '+(isLt?'lt':'dk')+(isF?' lmf':'')+(isT?' lmt':'');
    if(vc===0){var rr=document.createElement('span');rr.className='cr cr-r';rr.textContent=rank+1;div.appendChild(rr)}
    if(vr===7){var ff=document.createElement('span');ff.className='cr cr-f';ff.textContent=String.fromCharCode(97+file);div.appendChild(ff)}
    var pc=bd[7-rank][file];
    if(pc){var s=document.createElement('span');s.className='pc '+(pc.color==='w'?'pw':'pb');s.textContent=P[pc.color][pc.type];div.appendChild(s)}
    el.appendChild(div);
  }}
}

// ── NAVEGAÇÃO ──────────────────────────────────────────
function goTo(idx){
  if(!allMoves.length)return;
  idx=Math.max(-1,Math.min(allMoves.length-1,idx));
  game.reset();lastMove=null;var mo=null;
  for(var i=0;i<=idx;i++) mo=game.move(allMoves[i]);
  curIdx=idx;renderBoard();renderMoves();updateCtr();updateAnn(mo);
}
function goStart(){goTo(-1)} function goEnd(){goTo(allMoves.length-1)}
function prev(){goTo(curIdx-1)} function next(){goTo(curIdx+1)}
function flip(){flipped=!flipped;renderBoard()}
function togglePlay(){
  var btn=document.getElementById('playBtn');
  if(timer){clearInterval(timer);timer=null;btn.textContent='▶';return}
  if(curIdx>=allMoves.length-1)goTo(-1);
  btn.textContent='⏸';
  var spd=parseInt(document.getElementById('speedSlider').value);
  timer=setInterval(function(){if(curIdx>=allMoves.length-1){clearInterval(timer);timer=null;btn.textContent='▶';return}next();},spd);
}
function stopPlay(){if(timer){clearInterval(timer);timer=null;document.getElementById('playBtn').textContent='▶'}}

// ── SWIPE ──────────────────────────────────────────────
var touchX=0,touchY=0;
document.getElementById('board')&&document.addEventListener('touchstart',function(e){
  if(e.touches.length===1){touchX=e.touches[0].clientX;touchY=e.touches[0].clientY}
},{passive:true});
document.addEventListener('touchend',function(e){
  var el=document.getElementById('board');
  if(!el||!el.contains(e.target))return;
  var dx=e.changedTouches[0].clientX-touchX,dy=e.changedTouches[0].clientY-touchY;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){
    if(dx<0) next(); else prev();
  }
},{passive:true});

function renderMoves(){
  var el=document.getElementById('mvList');
  if(!allMoves.length){el.innerHTML='<div style="color:var(--txd);font-size:10px">Nenhuma partida carregada.</div>';return}
  var h='';
  for(var i=0;i<allMoves.length;i+=2){
    var n=Math.floor(i/2)+1,w=allMoves[i],b=allMoves[i+1]||'';
    h+='<div class="mr"><span class="mn">'+n+'.</span>';
    h+='<span class="mb '+(curIdx===i?'on':'')+(anns[i]?' ha':'')+'" onclick="goTo('+i+')">'+w+'</span>';
    h+='<span class="mb '+(curIdx===i+1?'on':'')+(anns[i+1]?' ha':'')+'" onclick="goTo('+(i+1)+')">'+b+'</span></div>';
  }
  el.innerHTML=h;
  var cur=el.querySelector('.mb.on');if(cur)cur.scrollIntoView({block:'nearest',behavior:'smooth'});
}
function updateCtr(){document.getElementById('moveCtr').textContent=allMoves.length?(curIdx+1)+' / '+allMoves.length:'— / —'}

function showAnn(text,type,lbl,mvl){
  var la=document.getElementById('annLabel'),lt=document.getElementById('annLabelTxt');
  la.className='af-lbl '+(type==='cur'?'cur':type==='eng'?'eng':'');
  lt.textContent=lbl;document.getElementById('annMove').textContent=mvl;
  var box=document.getElementById('annBox');box.textContent=text;
  box.className='af-txt '+(type==='cur'?'it':type==='mt'?'mt':'');
}
function mvLabel(){if(curIdx<0)return'';return'L.'+(Math.floor(curIdx/2)+1)+' '+allMoves[curIdx]+' '+(curIdx%2===0?'Br.':'Ng.')}
function updateAnn(mo){
  if(annTmr){clearTimeout(annTmr);annTmr=null}
  renderEval(null);
  if(curIdx===-1){showAnn('Selecione uma partida ou navegue os lances.','mt','—','');return}
  var lbl=mvLabel(),hard=anns[curIdx];
  if(hard) showAnn(hard,'cur','📖 ANOTAÇÃO',lbl);
  else if(mo&&fenH[curIdx]) showAnn(analyzeMove(mo,fenH[curIdx],fenH[curIdx+1]||'',curIdx),'eng','⚙ ANÁLISE',lbl);
  var fen=fenH[curIdx+1]||'';
  if(fen) annTmr=setTimeout(async function(){
    try{var ev=await fetchEval(fen);if(ev&&fenH[curIdx+1]===fen)renderEval(ev)}catch(ex){}
  },280);
  // Auto-expand se minimizado
  if(!afExpanded){afExpanded=true;document.getElementById('af').classList.remove('mini');document.getElementById('afTog').textContent='▲'}
}

// ── CARREGAR PARTIDA ──────────────────────────────────
function buildFenH(){var t=new Chess();fenH=[t.fen()];for(var i=0;i<allMoves.length;i++){t.move(allMoves[i]);fenH.push(t.fen())}}
function loadGame(pgn,a,m){
  stopPlay();var t=new Chess();
  var ok=t.load_pgn(pgn);
  if(!ok){toast('❌ PGN inválido',true);return false}
  curPGN=pgn;allMoves=t.history();anns=a||{};curIdx=-1;lastMove=null;
  meta={w:m.w||'',b:m.b||'',e:m.e||'',d:m.d||'',r:m.r||''};
  buildFenH();
  document.getElementById('pWhite').textContent=m.w||'?';
  document.getElementById('pBlack').textContent=m.b||'?';
  document.getElementById('resultBadge').innerHTML=m.r?'<span class="rbdg">'+m.r+'</span>':'';
  document.getElementById('evTag').textContent=m.e?m.e+(m.d?' · '+m.d:''):'';
  game.reset();renderBoard();renderMoves();updateCtr();
  showAnn('Posição inicial. Deslize ← → no tabuleiro ou use os botões.','mt','—','');
  renderEval(null);switchTab('mv');return true;
}

// ── BIBLIOTECA ────────────────────────────────────────
function renderLib(){
  document.getElementById('libList').innerHTML=LIB.map(function(g){
    return'<div class="gc" data-id="'+g.id+'" onclick="loadLib(\''+g.id+'\')">'
      +'<div class="gt">'+g.t+'</div><div class="gs">'+g.w+' vs '+g.b+' · '+g.d+'</div>'
      +'<div class="gd">'+g.ds+'</div>'
      +'<span class="bdg">'+g.o+'</span><span class="bdg">'+g.r+'</span></div>';
  }).join('');
}
function loadLib(id){
  var g=null;for(var i=0;i<LIB.length;i++){if(LIB[i].id===id){g=LIB[i];break}}if(!g)return;
  document.querySelectorAll('.gc').forEach(function(c){c.classList.remove('on')});
  var card=document.querySelector('[data-id="'+id+'"]');if(card)card.classList.add('on');
  var ok=loadGame(g.pgn,g.an,{w:g.w,b:g.b,r:g.r,e:g.e,d:g.d});
  if(ok)toast('♟ '+g.t);
}

// ── MINHA BIBLIOTECA ──────────────────────────────────
function loadUserLib(){var gs=getUserGames();renderUserLib(gs);document.getElementById('userCount').textContent=gs.length}
function getUserGames(){var gs=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.indexOf(PFX)===0){try{gs.push(JSON.parse(localStorage.getItem(k)))}catch(e){}}}return gs.sort(function(a,b){return b.addedAt.localeCompare(a.addedAt)})}
function renderUserLib(gs){
  var el=document.getElementById('userList');
  if(!gs.length){el.innerHTML='<div class="elib">Biblioteca vazia.<br>Importe e toque em <strong>💾 Salvar</strong>.</div>';return}
  el.innerHTML=gs.map(function(g){
    return'<div class="gc" onclick="loadUserGame(\''+g.id+'\')">'
      +'<button class="del" onclick="delGame(\''+g.id+'\',event)">×</button>'
      +'<div class="gt" style="font-size:12px">'+g.name+'</div>'
      +'<div class="gs">'+g.white+' vs '+g.black+'</div>'
      +(g.note?'<div class="gd" style="font-style:italic">"'+g.note+'"</div>':'')
      +'<span class="bdg">'+g.result+'</span>'
      +((g.tags||[]).map(function(t){return'<span class="bdg u">'+t+'</span>'}).join(''))
      +'</div>';
  }).join('');
}
function loadUserGame(id){var raw=localStorage.getItem(id);if(!raw)return;var g=JSON.parse(raw);loadGame(g.pgn,{},{w:g.white,b:g.black,r:g.result,e:g.event,d:g.date});toast('♟ '+g.name)}
function delGame(id,ev){ev.stopPropagation();if(!confirm('Remover?'))return;localStorage.removeItem(id);loadUserLib();toast('Removida')}
function exportLib(){var gs=getUserGames();if(!gs.length){toast('Biblioteca vazia',true);return}var blob=new Blob([gs.map(function(g){return'; '+g.name+'\n'+g.pgn}).join('\n\n')],{type:'text/plain'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='chess_study_mobile.pgn';a.click();toast('✓ Exportado')}

// ── MODAL SALVAR ──────────────────────────────────────
function openSaveModal(){
  if(!curPGN){toast('Nenhuma partida carregada',true);return}
  document.getElementById('saveName').value=meta.w&&meta.b?meta.w+' vs '+meta.b:'';
  document.getElementById('saveNote').value='';
  document.querySelectorAll('.mtg').forEach(function(t){t.classList.remove('on')});
  document.getElementById('modalBg').classList.add('on');
  setTimeout(function(){document.getElementById('saveName').focus()},100);
}
function closeModal(){document.getElementById('modalBg').classList.remove('on')}
function confirmSave(){
  var name=document.getElementById('saveName').value.trim()||meta.w+' vs '+meta.b;
  var note=document.getElementById('saveNote').value.trim();
  var tags=[];document.querySelectorAll('.mtg.on').forEach(function(t){tags.push(t.dataset.tag)});
  var id=PFX+Date.now();
  localStorage.setItem(id,JSON.stringify({id:id,name:name,note:note,tags:tags,pgn:curPGN,white:meta.w,black:meta.b,event:meta.e,date:meta.d,result:meta.r,addedAt:new Date().toISOString()}));
  closeModal();loadUserLib();switchTab('user');toast('✓ "'+name+'" salva!');
}

// ── TABS ──────────────────────────────────────────────
function switchTab(t){
  document.querySelectorAll('.ti').forEach(function(x){x.classList.remove('on')});
  document.querySelectorAll('.pane').forEach(function(x){x.classList.remove('on')});
  document.getElementById('tab-'+t).classList.add('on');
  document.getElementById('pane-'+t).classList.add('on');
}

// ── LICHESS ───────────────────────────────────────────
async function searchLich(){
  var u=document.getElementById('lichUser').value.trim();if(!u){toast('Digite um nome de usuário',true);return}
  var el=document.getElementById('searchRes');el.innerHTML='<div class="ld da">Buscando no Lichess</div>';switchTab('lich');
  try{
    var r=await fetch('https://lichess.org/api/games/user/'+encodeURIComponent(u)+'?max=10&opening=true&clocks=false&evals=false',{headers:{'Accept':'application/x-chess-pgn'}});
    if(!r.ok){el.innerHTML='<div class="msg err">Usuário não encontrado ('+r.status+')</div>';return}
    var txt=await r.text(),gs=splitPGN(txt);results=gs;
    if(!gs.length){el.innerHTML='<div class="msg err">Nenhuma partida encontrada.</div>';return}
    renderResults(gs,u);
  }catch(ex){el.innerHTML='<div class="msg err">Erro: '+ex.message+'</div>'}
}
async function importURL(){
  var url=document.getElementById('lichURL').value.trim();if(!url)return;
  var el=document.getElementById('searchRes');el.innerHTML='<div class="ld da">Importando</div>';switchTab('lich');
  try{
    var m=url.match(/lichess\.org\/([a-zA-Z0-9]{8,12})/);
    var fu=m?'https://lichess.org/game/export/'+m[1]+'?clocks=false&evals=false&opening=true':url;
    var r=await fetch(fu,{headers:{'Accept':'application/x-chess-pgn'}});
    if(!r.ok){el.innerHTML='<div class="msg err">Erro '+r.status+'</div>';return}
    var pgn=await r.text(),h=parseHeaders(pgn);
    el.innerHTML='<div class="msg ok">✓ Importada! Toque em 💾 Salvar.</div>';
    loadGame(pgn,{},{w:h.White,b:h.Black,r:h.Result,e:h.Event,d:h.Date});
  }catch(ex){el.innerHTML='<div class="msg err">Erro: '+ex.message+'</div>'}
}
function loadPGNDirect(){
  var pgn=document.getElementById('pgnPaste').value.trim();if(!pgn)return;
  var h=parseHeaders(pgn);
  var ok=loadGame(pgn,{},{w:h.White||'?',b:h.Black||'?',r:h.Result||'*',e:h.Event,d:h.Date});
  if(ok){document.getElementById('pgnPaste').value='';toast('✓ PGN carregado!')}
}
function loadResult(i){var pgn=results[i],h=parseHeaders(pgn);loadGame(pgn,{},{w:h.White||'?',b:h.Black||'?',r:h.Result||'*',e:h.Event,d:h.Date})}
function splitPGN(txt){return txt.split(/(?=\[Event\s)/g).filter(function(s){return s.trim()&&s.indexOf('1.')>=0})}
function parseHeaders(pgn){var h={},m,re=/\[(\w+)\s+"([^"]*)"\]/g;while((m=re.exec(pgn))!==null)h[m[1]]=m[2];return h}
function renderResults(gs,u){
  var h='<div class="shd" style="margin-top:10px">'+gs.length+' partidas — '+u+'</div>';
  gs.forEach(function(pgn,i){var h2=parseHeaders(pgn);h+='<div class="gc" onclick="loadResult('+i+')">'+'<div class="gt" style="font-size:12px">'+(h2.White||'?')+' vs '+(h2.Black||'?')+'</div><div class="gs">'+(h2.Date||'')+'</div><span class="bdg">'+(h2.Result||'*')+'</span></div>'});
  document.getElementById('searchRes').innerHTML=h;
}

// ── TOAST ─────────────────────────────────────────────
var tTimer=null;
function toast(msg,err){
  var el=document.getElementById('toast');el.textContent=msg;el.className='toast on'+(err?' err':'');
  if(tTimer)clearTimeout(tTimer);tTimer=setTimeout(function(){el.classList.remove('on')},err?4000:2500);
}

// ── INICIALIZAÇÃO ─────────────────────────────────────
var bootTries=0;
function waitChess(){
  if(typeof Chess!=='undefined'){
    try{
      game=new Chess();
      var test=new Chess();
      test.load_pgn('[Event "T"]\n[White "A"]\n[Black "B"]\n[Result "1-0"]\n\n1. e4 e5 1-0');
      renderLib();renderBoard();loadUserLib();
      document.getElementById('boot').style.display='none';
    }catch(err){document.querySelector('.boot-msg').textContent='Erro: '+err.message}
    return;
  }
  if(++bootTries>200){document.querySelector('.boot-msg').textContent='Erro: chess.js não carregou.';return}
  setTimeout(waitChess,50);
}
waitChess();
